syntax = "proto3";

package bench.v1;

enum Enum {
  ENUM_UNSPECIFIED = 0;
  ENUM_A = 1;
  ENUM_B = 2;
}

// Singular scalar of every wire type. The element type reused by the repeated
// and map message fixtures below.
message Scalar {
  double double_field = 1;
  float float_field = 2;
  int32 int32_field = 3;
  int64 int64_field = 4;
  uint32 uint32_field = 5;
  uint64 uint64_field = 6;
  sint32 sint32_field = 7;
  sint64 sint64_field = 8;
  fixed32 fixed32_field = 9;
  fixed64 fixed64_field = 10;
  sfixed32 sfixed32_field = 11;
  sfixed64 sfixed64_field = 12;
  bool bool_field = 13;
  string string_field = 14;
  bytes bytes_field = 15;
}

// Packed repeated scalars.
message RepeatedScalar {
  repeated int32 int32_field = 1;
  repeated int64 int64_field = 2;
  repeated double double_field = 3;
  repeated bool bool_field = 4;
  repeated string string_field = 5;
}

// Repeated nested messages.
message RepeatedMessage {
  repeated Scalar values = 1;
}

// Maps with scalar values.
message MapScalar {
  map<string, int32> str_int32 = 1;
  map<int32, string> int32_str = 2;
  map<string, string> str_str = 3;
}

// Maps with message values.
message MapMessage {
  map<string, Scalar> values = 1;
}

// A self-referential message with scalars, repeated, maps, enums, oneofs, optional presence, and nested messages.
message General {
  double double_field = 1;
  int32 int32_field = 2;
  uint32 uint32_field = 3333;
  optional int64 int64_field = 3;
  optional bool bool_field = 4;
  string string_field = 5;
  bytes bytes_field = 6;
  Enum enum_field = 7;
  General small_message_field = 8;

  repeated double repeated_double_field = 19;
  repeated int32 repeated_int32_field = 20;
  repeated int64 repeated_int64_field = 41;
  repeated bool repeated_bool_field = 22;
  repeated string repeated_short_string_field = 23;
  repeated string repeated_long_string_field = 24;
  repeated bytes repeated_short_bytes_field = 25;
  repeated bytes repeated_long_bytes_field = 26;
  repeated Enum repeated_enum_field = 27;
  repeated General repeated_small_message_field = 28;

  map<int32, int32> map_int32_int32 = 30;
  map<int64, int64> map_int64_int64 = 31;
  map<string, General> map_string_message = 32;
  map<string, Enum> map_string_enum = 33;

  oneof oneof_enum {
    Enum oneof_enum_verified = 34;
    Enum oneof_enum_cromulent = 35;
  }
  oneof oneof_message {
    General oneof_message_field = 36;
    General oneof_small_message_field = 37;
  }
  oneof oneof_scalar {
    int32 oneof_int32_field = 38;
    bool oneof_bool_field = 39;
  }

  uint32 id = 40;
}

// A small message with scalars, a self-referential nested message, a repeated string, and a string map.
message User {
  string first_name = 1;
  string last_name = 2;
  bool active = 3;
  User manager = 4;
  repeated string locations = 5;
  map<string, string> projects = 6;
}
